version: "3.8"

services:
  db-service:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: springdocker
    ports:
      - "3306:3306"
    networks:
      - app-network

  app-service:
    image: ens/springdocker:1.0
    container_name: spring-app
    depends_on:
      - db-service
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-service:3306/springdocker
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    networks:
      - app-network

networks:
  app-network:
